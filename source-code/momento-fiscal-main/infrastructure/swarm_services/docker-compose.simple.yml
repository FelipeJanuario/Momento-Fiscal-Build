version: '3.7'

x-api-config: &api-config
  image: momento-fiscal-api:latest
  secrets:
    - momento_fiscal_postgres_password
    - momento_fiscal_secret_key_base
    - momento_fiscal_smtp_password
    - momento_fiscal_lockbox_master_key
    - momento_fiscal_active_record_encryption_primary_key
    - momento_fiscal_active_record_encryption_deterministic_key
    - momento_fiscal_active_record_encryption_key_derivation_salt
    - momento_fiscal_biddings_analyser_api_key
    - momento_fiscal_stripe_secret_key
    - momento_fiscal_pje_auth_pfx
    - momento_fiscal_pje_auth_pfx_password
    - momento_fiscal_pje_auth_certchain
    - momento_fiscal_google_api_pfx_base64
  depends_on:
    - db
    - redis

x-api-variables: &api-variables
  RAILS_ENV: production
  RAILS_MAX_THREADS: 5
  DATABASE_HOST: db
  DATABASE_USER: postgres
  DATABASE_NAME: momento_fiscal_production
  SECRET_KEY_BASE_FILE: /run/secrets/momento_fiscal_secret_key_base
  LOCKBOX_MASTER_KEY_FILE: /run/secrets/momento_fiscal_lockbox_master_key
  DATABASE_PASSWORD_FILE: /run/secrets/momento_fiscal_postgres_password
  PORT: 80
  REDIS_HOST: redis
  REDIS_PORT: 6379
  # SMTP Config
  MAIL_SMTP_PORT: "587"
  MAIL_SMTP_LOGIN: "noreply@momentofiscal.com.br"
  MAIL_SMTP_DOMAIN: "momentofiscal.com.br"
  MAIL_SMTP_SSL: "false"
  MAIL_SMTP_PASSWORD_FILE: /run/secrets/momento_fiscal_smtp_password
  # Domain
  DOMAIN: "165.22.136.67"
  # Encryption Keys (usando secrets)
  ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY_FILE: /run/secrets/momento_fiscal_active_record_encryption_primary_key
  ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY_FILE: /run/secrets/momento_fiscal_active_record_encryption_deterministic_key
  ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT_FILE: /run/secrets/momento_fiscal_active_record_encryption_key_derivation_salt
  # Biddings Analyser (DEV_MODE = mock data)
  DEV_MODE: "true"
  BIDDINGS_ANALYSER_URL: "https://ba.dtr40.com.br"
  BIDDINGS_ANALYSER_API_KEY_FILE: /run/secrets/momento_fiscal_biddings_analyser_api_key
  # Stripe
  STRIPE_SECRET_KEY_FILE: /run/secrets/momento_fiscal_stripe_secret_key
  STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
  # External APIs (placeholders - DEV_MODE ignores)
  JUSBRASIL_API_TOKEN: "placeholder"
  SERPRO_CONSUMER_KEY: "hXCBy8nQx5B_xAUhxcB87s6wvLga"
  SERPRO_CONSUMER_SECRET: "Sw43rQxUBdgycGrF3yfwHKxyaZAa"
  # PJE Auth
  PJE_AUTH_PFX_FILE: /run/secrets/momento_fiscal_pje_auth_pfx
  PJE_AUTH_PFX_PASSWORD_FILE: /run/secrets/momento_fiscal_pje_auth_pfx_password
  PJE_AUTH_CERTCHAIN_FILE: /run/secrets/momento_fiscal_pje_auth_certchain
  GOOGLE_API_PFX_BASE64_FILE: /run/secrets/momento_fiscal_google_api_pfx_base64
  # OpenTelemetry (disabled)
  OTEL_SDK_DISABLED: "true"
  OTEL_SERVICE_NAME: "momento-fiscal-api"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4318"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      placement:
        constraints:
          - "node.role==manager"
    command: redis-server
    volumes:
      - redis:/data
    networks:
      - app

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    deploy:
      placement:
        constraints:
          - "node.role==manager"
    networks:
      - app
    ports:
      - "5432:5432"
    volumes:
      - 'postgres:/var/lib/postgresql/data'
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/momento_fiscal_postgres_password
      POSTGRES_USER: postgres
      POSTGRES_DB: momento_fiscal_production
    secrets:
      - momento_fiscal_postgres_password

  backend:
    <<: *api-config
    restart: unless-stopped
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      placement:
        constraints:
          - "node.role==manager"
    ports:
      - "3000:80"
    networks:
      - app
    environment:
      <<: *api-variables

  sidekiq:
    <<: *api-config
    command: bundle exec sidekiq
    healthcheck:
      disable: true
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.role==manager"
    networks:
      - app
    environment:
      <<: *api-variables

  frontend:
    image: momento-fiscal-frontend:latest
    restart: unless-stopped
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.role==manager"
    ports:
      - "8080:80"
    networks:
      - app

networks:
  app:
    driver: overlay

secrets:
  momento_fiscal_secret_key_base:
    external: true
  momento_fiscal_postgres_password:
    external: true
  momento_fiscal_smtp_password:
    external: true
  momento_fiscal_lockbox_master_key:
    external: true
  momento_fiscal_active_record_encryption_primary_key:
    external: true
  momento_fiscal_active_record_encryption_deterministic_key:
    external: true
  momento_fiscal_active_record_encryption_key_derivation_salt:
    external: true
  momento_fiscal_biddings_analyser_api_key:
    external: true
  momento_fiscal_stripe_secret_key:
    external: true
  momento_fiscal_pje_auth_pfx:
    external: true
  momento_fiscal_pje_auth_pfx_password:
    external: true
  momento_fiscal_pje_auth_certchain:
    external: true
  momento_fiscal_google_api_pfx_base64:
    external: true

volumes:
  postgres:
  redis:
