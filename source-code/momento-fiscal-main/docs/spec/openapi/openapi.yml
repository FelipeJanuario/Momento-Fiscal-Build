openapi: 3.1.0
info:
  title: Momento Fiscal API
  description: |
    API completa do sistema Momento Fiscal - plataforma para análise fiscal e consultorias.
    
    Esta API fornece endpoints para:
    - Autenticação e gerenciamento de usuários
    - Gestão de instituições
    - Consultorias e propostas
    - Notificações
    - Análise de licitações
    - Integração com Stripe para pagamentos
    - Consultas ao SERPRO
    
    ## Autenticação
    A API utiliza JWT (JSON Web Tokens) para autenticação. Após o login, inclua o token no header:
    `Authorization: Bearer <seu_token>`
    
    ## Paginação
    Endpoints que retornam listas suportam paginação via parâmetros:
    - `page`: número da página (padrão: 1)
    - `per_page`: itens por página (padrão: 10)
    
  version: "v0.1.4"
  contact:
    name: Momento Fiscal Team
    email: contato@momentofiscal.com.br
    url: https://momentofiscal.com.br
  license:
    name: Proprietary
  x-logo:
    url: "https://momentofiscal.com.br/wp-content/uploads/2025/05/logo-momento-fiscal-v1.svg"
    altText: "Momento Fiscal Logo"
    href: "https://momentofiscal.com.br"
  termsOfService: "https://momentofiscal.com.br/lgpd/"

servers:
  - url: http://localhost:3000
    description: Servidor de desenvolvimento
  - url: https://momentofiscal.spezi.com.br
    description: Servidor de produção

tags:
  - name: Health
    description: Verificação de saúde do sistema
  - name: Authentication
    description: Autenticação e gerenciamento de sessões
  - name: Users
    description: Operações com usuários
  - name: Institutions
    description: Gestão de instituições
  - name: User Institutions
    description: Tabela associativa entre usuários e instituições
  - name: Consultings
    description: Gerenciamento de consultorias
  - name: Consulting Proposals
    description: Propostas de consultoria
  - name: Notifications
    description: Sistema de notificações
  - name: Invitations
    description: Convites de usuários
  - name: Free Plan Usage
    description: Controle de uso do plano gratuito
  - name: Biddings Analyser
    description: Análise de licitações e empresas
  - name: SERPRO
    description: Consultas ao SERPRO
  - name: Processes
    description: Processos judiciais

paths:
  # Health Check
  /api/health/up:
    get:
      tags:
        - Health
      summary: Verificação de saúde do sistema
      description: Endpoint para verificar se a API está funcionando corretamente
      responses:
        '200':
          description: Sistema funcionando normalmente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: Erro interno do servidor

  # Authentication Endpoints
  /api/v1/authentication/users/sign_in:
    post:
      tags:
        - Authentication
      summary: Login de usuário
      description: Autentica um usuário e retorna um token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  type: object
                  required:
                    - identity
                    - password
                  properties:
                    identity:
                      type: string
                      example: "12345678900"
                    password:
                      type: string
                      format: password
                      example: "minhasenha123"
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
        '401':
          description: Credenciais inválidas
        '404':
          description: Usuário não encontrado

  /api/v1/authentication/users/sign_out:
    delete:
      tags:
        - Authentication
      summary: Logout de usuário
      description: Encerra a sessão do usuário autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout realizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Signed out successfully"

  /api/v1/authentication/users:
    post:
      tags:
        - Authentication
      summary: Registro de usuário
      description: Registra um novo usuário no sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  $ref: '#/components/schemas/UserRegistrationInput'
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrors'

  # Users CRUD
  /api/v1/users:
    get:
      tags:
        - Users
      summary: Listar usuários
      description: Retorna uma lista paginada de usuários
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QueryParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Lista de usuários
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersListResponse'
    post:
      tags:
        - Users
      summary: Criar usuário
      description: Cria um novo usuário no sistema
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  $ref: '#/components/schemas/UserUpdateInput'
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Dados inválidos

  /api/v1/users/{id}:
    get:
      tags:
        - Users
      summary: Obter usuário
      description: Retorna os detalhes de um usuário específico
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID do usuário
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalhes do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Usuário não encontrado
    patch:
      tags:
        - Users
      summary: Atualizar usuário
      description: Atualiza os dados de um usuário
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID do usuário
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  $ref: '#/components/schemas/UserUpdateInput'
      responses:
        '200':
          description: Usuário atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Dados inválidos
    delete:
      tags:
        - Users
      summary: Excluir usuário
      description: Remove um usuário do sistema
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID do usuário
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Usuário excluído com sucesso
        '404':
          description: Usuário não encontrado

  # Institutions
  /api/v1/institutions:
    get:
      tags:
        - Institutions
      summary: Listar instituições
      description: Retorna uma lista paginada de instituições
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QueryParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Lista de instituições
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstitutionsListResponse'
    post:
      tags:
        - Institutions
      summary: Criar instituição
      description: Cria uma nova instituição junto com usuário responsável
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - institution
                - user
              properties:
                institution:
                  $ref: '#/components/schemas/InstitutionInput'
                user:
                  $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: Instituição criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstitutionResponse'
        '422':
          description: Dados inválidos

  /api/v1/institutions/{id}:
    get:
      tags:
        - Institutions
      summary: Obter instituição
      description: Retorna os detalhes de uma instituição específica
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID da instituição
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalhes da instituição
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstitutionResponse'
        '404':
          description: Instituição não encontrada
    patch:
      tags:
        - Institutions
      summary: Atualizar instituição
      description: Atualiza os dados de uma instituição
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID da instituição
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - institution
              properties:
                institution:
                  $ref: '#/components/schemas/InstitutionInput'
      responses:
        '200':
          description: Instituição atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstitutionResponse'
        '422':
          description: Dados inválidos
    delete:
      tags:
        - Institutions
      summary: Excluir instituição
      description: Remove uma instituição do sistema
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID da instituição
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Instituição excluída com sucesso
        '404':
          description: Instituição não encontrada

  # Consultings
  /api/v1/consultings:
    get:
      tags:
        - Consultings
      summary: Listar consultorias
      description: Retorna uma lista paginada de consultorias
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QueryParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Lista de consultorias
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultingsListResponse'
    post:
      tags:
        - Consultings
      summary: Criar consultoria
      description: Cria uma nova consultoria
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - consulting
              properties:
                consulting:
                  $ref: '#/components/schemas/ConsultingInput'
      responses:
        '201':
          description: Consultoria criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultingResponse'
        '422':
          description: Dados inválidos

  /api/v1/consultings/{id}:
    get:
      tags:
        - Consultings
      summary: Obter consultoria
      description: Retorna os detalhes de uma consultoria específica
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID da consultoria
          schema:
            type: integer
      responses:
        '200':
          description: Detalhes da consultoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultingResponse'
        '404':
          description: Consultoria não encontrada
    patch:
      tags:
        - Consultings
      summary: Atualizar consultoria
      description: Atualiza os dados de uma consultoria
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID da consultoria
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - consulting
              properties:
                consulting:
                  $ref: '#/components/schemas/ConsultingInput'
      responses:
        '200':
          description: Consultoria atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultingResponse'
        '422':
          description: Dados inválidos
    delete:
      tags:
        - Consultings
      summary: Excluir consultoria
      description: Remove uma consultoria do sistema
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID da consultoria
          schema:
            type: integer
      responses:
        '204':
          description: Consultoria excluída com sucesso
        '404':
          description: Consultoria não encontrada

  /api/v1/consultings/{import_hash}/import:
    post:
      tags:
        - Consultings
      summary: Importar consultoria
      description: Importa uma consultoria usando hash de importação
      security:
        - bearerAuth: []
      parameters:
        - name: import_hash
          in: path
          required: true
          description: Hash de importação da consultoria
          schema:
            type: string
      responses:
        '200':
          description: Consultoria importada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultingResponse'
        '404':
          description: Consultoria não encontrada

  # Notifications
  /api/v1/notifications:
    get:
      tags:
        - Notifications
      summary: Listar notificações
      description: Retorna uma lista paginada de notificações do usuário atual
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QueryParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Lista de notificações
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationsListResponse'

  /api/v1/notifications/{id}:
    get:
      tags:
        - Notifications
      summary: Obter notificação
      description: Retorna os detalhes de uma notificação específica
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID da notificação
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalhes da notificação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '404':
          description: Notificação não encontrada
    delete:
      tags:
        - Notifications
      summary: Excluir notificação
      description: Remove uma notificação do usuário
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID da notificação
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Notificação excluída com sucesso
        '404':
          description: Notificação não encontrada

  # Biddings Analyser
  /api/v1/biddings_analyser/download:
    get:
      tags:
        - Biddings Analyser
      summary: Download de arquivo
      description: Redireciona para download de arquivo do analisador de licitações
      security:
        - bearerAuth: []
      parameters:
        - name: file_id
          in: query
          required: true
          description: ID do arquivo para download
          schema:
            type: string
      responses:
        '302':
          description: Redirecionamento para download
        '404':
          description: Arquivo não encontrado

  /api/v1/biddings_analyser/debts:
    get:
      tags:
        - Biddings Analyser
      summary: Consultar dívidas
      description: Busca informações sobre dívidas no sistema de análise de licitações
      security:
        - bearerAuth: []
      parameters:
        - name: _id
          in: query
          description: ID da dívida
          schema:
            type: string
        - name: cpf_cnpj
          in: query
          description: CPF ou CNPJ do devedor
          schema:
            type: string
        - name: registration_status
          in: query
          description: Status de registro
          schema:
            type: string
        - name: registration_status_type
          in: query
          description: Tipo de status de registro
          schema:
            type: string
        - name: debted_name
          in: query
          description: Nome do devedor
          schema:
            type: string
        - name: page
          in: query
          description: Número da página
          schema:
            type: integer
        - name: page_size
          in: query
          description: Tamanho da página
          schema:
            type: integer
      responses:
        '200':
          description: Lista de dívidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtsListResponse'

  /api/v1/biddings_analyser/debts/{cpf_cnpj}/debts_per_debted_name:
    get:
      tags:
        - Biddings Analyser
      summary: Resumo de dívidas por nome do devedor
      description: |
        Retorna a soma (debts_value) e a contagem (debts_count) de dívidas agrupadas por
        debted_name para um CPF/CNPJ informado. Os resultados são ordenados por debted_name.
      security:
        - bearerAuth: []
      parameters:
        - name: cpf_cnpj
          in: path
          required: true
          description: CPF ou CNPJ do devedor
          schema:
            type: string
      responses:
        '200':
          description: Lista agregada de dívidas por devedor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtsPerDebtedNameListResponse'

  /api/v1/biddings_analyser/companies:
    get:
      tags:
        - Biddings Analyser
      summary: Listar empresas
      description: Busca informações sobre empresas no sistema de análise
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: Termo de busca
          schema:
            type: string
        - name: page
          in: query
          description: Número da página
          schema:
            type: integer
        - name: page_size
          in: query
          description: Tamanho da página
          schema:
            type: integer
      responses:
        '200':
          description: Lista de empresas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompaniesListResponse'

  /api/v1/biddings_analyser/companies/count_in_location:
    get:
      tags:
        - Biddings Analyser
      summary: Contar empresas por localização
      description: |
        Retorna a contagem de empresas dentro de uma área retangular (bounding box).
        Informe os dois pontos (cantos opostos) usando coordenadas [longitude, latitude].
      security:
        - bearerAuth: []
      parameters:
        - name: starting_point
          in: query
          required: true
          description: Primeiro ponto (canto) do retângulo de consulta no formato [longitude, latitude]
          style: form
          explode: true
          schema:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: number
              format: double
          examples:
            exemplo:
              value: [-46.7000, -23.6000]
        - name: ending_point
          in: query
          required: true
          description: Segundo ponto (canto oposto) do retângulo de consulta no formato [longitude, latitude]
          style: form
          explode: true
          schema:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: number
              format: double
          examples:
            exemplo:
              value: [-46.3000, -23.3000]
      responses:
        '200':
          description: Contagem de empresas
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /api/v1/biddings_analyser/companies/in_location:
    get:
      tags:
        - Biddings Analyser
      summary: Empresas por localização
      description: |
        Lista empresas localizadas dentro de uma área retangular (bounding box),
        com ordenação por `debts_value` desc e suporte a filtros e paginação.
      security:
        - bearerAuth: []
      parameters:
        - name: starting_point
          in: query
          required: true
          description: Primeiro ponto (canto) do retângulo de consulta no formato [longitude, latitude]
          style: form
          explode: true
          schema:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: number
              format: double
          examples:
            exemplo:
              value: [-46.7000, -23.6000]
        - name: ending_point
          in: query
          required: true
          description: Segundo ponto (canto oposto) do retângulo de consulta no formato [longitude, latitude]
          style: form
          explode: true
          schema:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: number
              format: double
          examples:
            exemplo:
              value: [-46.3000, -23.3000]
        - name: page
          in: query
          description: Número da página
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          description: Tamanho da página
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: min_debts_value
          in: query
          description: Valor mínimo de `debts_value` (filtro gte)
          schema:
            type: number
            format: float
        - name: _id
          in: query
          description: Filtro por ID interno (Mongo `_id`)
          schema:
            type: string
        - name: cnpj
          in: query
          description: Filtro por CNPJ (somente números)
          schema:
            type: string
            pattern: '^\d{14}$'
        - name: debts_value
          in: query
          description: "Filtros por campo `debts_value` usando notação de objeto (exemplo: debts_value[gte]=1000)"
          style: deepObject
          explode: true
          schema:
            type: object
            properties:
              gte:
                type: number
                format: float
              lte:
                type: number
                format: float
              eq:
                type: number
                format: float
      responses:
        '200':
          description: Lista de empresas na localização
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompaniesListResponse'

  # SERPRO
  /api/v1/consulta_cpf/{cpf}:
    get:
      tags:
        - SERPRO
      summary: Consultar CPF
      description: Realiza consulta de CPF no SERPRO
      security:
        - bearerAuth: []
      parameters:
        - name: cpf
          in: path
          required: true
          description: CPF para consulta (apenas números)
          schema:
            type: string
            pattern: '^\d{11}$'
      responses:
        '200':
          description: Dados do CPF consultado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SerproCpfResponse'
        '404':
          description: CPF não encontrado

  # Processes
  /api/v1/processes:
    get:
      tags:
        - Processes
      summary: Consultar processos
      description: Consulta processos judiciais
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de processos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessesListResponse'

  # # Stripe Integration
  # /api/v1/stripe/create_setup_intent:
  #   post:
  #     tags:
  #       - Stripe
